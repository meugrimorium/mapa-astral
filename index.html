<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Mapa Astral âœ¨</title>

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* (SEU CSS ORIGINAL â€” NÃƒO ALTEREI NADA RELEVANTE) */
:root {
--primary:#8b698e;--secondary:#6c724d;--accent:#c9a86a;
--light:#e8dcc2;--bege:#d9d9d9;--dark:#403c39;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--bege);}
.container{max-width:1200px;margin:0 auto;padding:20px;}
.header{text-align:center;margin-bottom:40px;}
.header h1{font-family:'Pirata One';font-size:4rem;color:var(--accent);}
.form-section{background:#403c39;padding:30px;border-radius:20px;}
.form-grid{display:grid;gap:20px;}
.input-group input,.input-group select{
width:100%;padding:15px;border-radius:10px;border:none;
}
.calculate-btn{margin-top:20px;padding:15px;width:100%;cursor:pointer;}
.resultados{margin-top:40px;}
.card{background:#555;padding:15px;margin-bottom:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="container">
<div class="header">
<h1>Meu Mapa Astral</h1>
</div>

<div class="form-section">
<div class="form-grid">

<input id="nome" placeholder="Nome">
<input type="date" id="dataNascimento">
<input type="time" id="horaNascimento">

<select id="cidade">
<option>Carregando cidades...</option>
</select>

</div>

<button class="calculate-btn" onclick="calcularMapa()">Calcular</button>
</div>

<div id="resultados" class="resultados"></div>
</div>

<script>

// ðŸ”‘ COLOQUE SUA API KEY AQUI
const API_KEY = "SUA_API_KEY_AQUI";


// ðŸŒŽ CARREGAR CIDADES
async function carregarCidades() {
const res = await fetch('./cidades-brasil.json');
const cidades = await res.json();

const select = document.getElementById('cidade');
select.innerHTML = '<option value="">Selecione...</option>';

cidades.sort((a,b)=>a.nome.localeCompare(b.nome));

cidades.forEach(c => {
const opt = document.createElement('option');
opt.value = JSON.stringify(c);
opt.textContent = c.nome;
select.appendChild(opt);
});
}


// ðŸ”® CALCULAR MAPA REAL
async function calcularMapa() {

const nome = document.getElementById('nome').value;
const data = document.getElementById('dataNascimento').value;
const hora = document.getElementById('horaNascimento').value;
const cidadeRaw = document.getElementById('cidade').value;

if(!nome || !data || !hora || !cidadeRaw){
alert("Preencha tudo");
return;
}

const cidade = JSON.parse(cidadeRaw);

// separar data
const [ano,mes,dia] = data.split("-");
const [horaN,min] = hora.split(":");

// CHAMADA REAL DA API
const res = await fetch(`https://api.api-ninjas.com/v1/astrology?year=${ano}&month=${mes}&day=${dia}&hour=${horaN}&min=${min}&lat=${cidade.lat}&lon=${cidade.lon}`,{
headers: { 'X-Api-Key': API_KEY }
});

const dados = await res.json();

mostrarResultados(dados);
}


// ðŸ“Š MOSTRAR RESULTADOS
function mostrarResultados(dados){

const container = document.getElementById('resultados');
container.innerHTML = '';

Object.keys(dados).forEach(planeta => {
const p = dados[planeta];

const div = document.createElement('div');
div.className = 'card';

div.innerHTML = `
<h3>${planeta}</h3>
<p>Signo: ${p.sign}</p>
<p>Grau: ${p.degree}</p>
`;

container.appendChild(div);
});

}


// ðŸš€ INIT
window.onload = () => {
carregarCidades();
};

</script>

</body>
</html>
