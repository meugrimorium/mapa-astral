<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Meu Mapa Astral</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonte título -->
  <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet" />

  <!-- Luxon -->
  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>

  <style>
    :root {
      --roxo: #8b698e;
      --verde: #6c724d;
      --dourado: #c9a86a;
      --bege: #e8dcc2;
      --cinza: #d9d9d9;
      --grafite: #403c39;
      --fundo: #181414;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #2b2220 0, #181414 45%, #0c0908 100%);
      color: var(--bege);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .app-shell {
      width: 100%;
      max-width: 900px;
      background: rgba(24, 20, 20, 0.96);
      border-radius: 24px;
      border: 1px solid rgba(201, 168, 106, 0.35);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.7);
      padding: 24px 26px 26px;
      position: relative;
      overflow: hidden;
    }

    .header {
      text-align: center;
      margin-bottom: 18px;
    }

    .header-title {
      font-size: 32px;
      color: var(--bege);
      font-family: "Pirata One", cursive;
      letter-spacing: 0.04em;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.8);
    }

    .view {
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .view-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
    }

    .view-visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .form-card {
      background: rgba(34, 28, 27, 0.96);
      border-radius: 18px;
      border: 1px solid rgba(232, 220, 194, 0.18);
      padding: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 18px;
    }

    @media (max-width: 720px) {
      .form-card {
        grid-template-columns: 1fr;
      }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 13px;
    }

    .form-label {
      font-weight: 500;
    }

    .form-input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 9px;
      border: 1px solid rgba(232, 220, 194, 0.4);
      background: #221b1a;
      color: var(--bege);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-input:focus {
      border-color: var(--dourado);
      box-shadow: 0 0 0 1px rgba(201, 168, 106, 0.4);
    }

    .autocomplete-list {
      background: #221b1a;
      border: 1px solid rgba(232,220,194,0.3);
      border-radius: 8px;
      margin-top: 4px;
      max-height: 180px;
      overflow-y: auto;
      display: none;
      position: relative;
      z-index: 10;
    }

    .autocomplete-item {
      padding: 8px 10px;
      cursor: pointer;
    }

    .autocomplete-item:hover {
      background: rgba(201,168,106,0.15);
    }

    .btn-primary {
      padding: 9px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--roxo), var(--dourado));
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.6);
    }

    table {
      color: var(--bege);
      font-size: 13px;
      width: 100%;
      border-collapse: collapse;
    }

    table td, table th {
      border: 1px solid rgba(201, 168, 106, 0.3);
      text-align: left;
      padding: 8px;
    }

    table tr:nth-child(even) {
      background: rgba(34, 28, 27, 0.5);
    }
  </style>
</head>

<body>
  <div class="app-shell">

    <header class="header">
      <div class="header-title">Meu Mapa Astral</div>
    </header>

    <!-- VIEW: FORMULÁRIO -->
    <main id="view-form" class="view view-visible">
      <form id="astroForm" class="form-card">

        <div class="form-group">
          <label class="form-label" for="name">Nome</label>
          <input id="name" name="name" type="text" class="form-input" placeholder="Seu nome completo" />
        </div>

        <div class="form-group">
          <label class="form-label" for="birthDate">Data de nascimento</label>
          <input id="birthDate" name="birthDate" type="date" class="form-input" />
        </div>

        <div class="form-group">
          <label class="form-label" for="birthTime">Hora de nascimento</label>
          <input id="birthTime" name="birthTime" type="time" class="form-input" />
        </div>

        <div class="form-group">
          <label class="form-label">Cidade de nascimento</label>
          <input id="cidade" class="form-input" placeholder="Digite sua cidade (apenas visual, fuso: São Paulo)" autocomplete="off" />
          <div id="lista-cidades" class="autocomplete-list"></div>
        </div>

        <div class="form-footer" style="grid-column: 1 / -1; margin-top: 8px;">
          <button type="submit" class="btn-primary">Gerar mapa astral</button>
        </div>

      </form>
    </main>

    <!-- VIEW: RESULTADO -->
    <main id="view-result" class="view view-hidden" style="margin-top: 24px;">

      <h2 id="result-title" style="font-family: 'Pirata One', cursive; font-size: 28px; margin-bottom: 6px;"></h2>
      <div id="result-meta" style="opacity: 0.8; margin-bottom: 18px;"></div>

      <div style="display: flex; justify-content: center; margin-bottom: 24px;">
        <svg id="chart-svg" width="400" height="400"></svg>
      </div>

      <table style="margin-bottom: 24px;">
        <thead>
          <tr style="background: rgba(201,168,106,0.15);">
            <th>Ponto</th>
            <th>Signo</th>
            <th>Posição</th>
            <th>Casa</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>

      <div id="summary-text" style="margin-bottom: 24px; line-height: 1.6;"></div>

      <pre id="mono-block" style="
        background: #111;
        padding: 16px;
        border-radius: 12px;
        border: 1px solid rgba(201,168,106,0.3);
        white-space: pre-wrap;
        margin-bottom: 24px;
      "></pre>

      <div style="display: flex; gap: 12px; flex-wrap: wrap;">
        <button id="btn-back" class="btn-primary">Voltar</button>
        <button id="btn-copy" class="btn-primary">Copiar texto</button>
        <button id="btn-pdf" class="btn-primary">Salvar PDF</button>
      </div>

    </main>

  </div>

  <script>
    const DEG2RAD = Math.PI / 180;
    const RAD2DEG = 180 / Math.PI;

    const ZODIAC_SIGNS = [
      "Áries", "Touro", "Gêmeos", "Câncer", "Leão", "Virgem",
      "Libra", "Escorpião", "Sagitário", "Capricórnio", "Aquário", "Peixes"
    ];

    const POINTS = [
      { key: "sun", name: "Sol" },
      { key: "moon", name: "Lua" },
      { key: "mercury", name: "Mercúrio" },
      { key: "venus", name: "Vênus" },
      { key: "mars", name: "Marte" },
      { key: "jupiter", name: "Júpiter" },
      { key: "saturn", name: "Saturno" },
      { key: "uranus", name: "Urano" },
      { key: "neptune", name: "Netuno" },
      { key: "pluto", name: "Plutão" },
      { key: "chiron", name: "Quíron" },
      { key: "lilith", name: "Lilith" },
      { key: "nnode", name: "Nodo Norte" },
      { key: "pof", name: "Parte da Fortuna" },
      { key: "vertex", name: "Vertex" },
      { key: "asc", name: "Ascendente" },
      { key: "mc", name: "Meio do Céu" }
    ];

    let selectedLocation = {
      name: "São Paulo (fuso padrão)",
      lat: -23.5505,
      lon: -46.6333,
      timezoneId: "America/Sao_Paulo"
    };

    const DateTime = luxon.DateTime;

    function pad2(n) {
      return n < 10 ? "0" + n : "" + n;
    }

    function formatDegree(deg) {
      let d = ((deg % 360) + 360) % 360;
      const signIndex = Math.floor(d / 30);
      const sign = ZODIAC_SIGNS[signIndex];
      const degInSign = d - signIndex * 30;
      const whole = Math.floor(degInSign);
      const minutes = Math.round((degInSign - whole) * 60);
      return {
        sign,
        text: `${pad2(whole)}°${pad2(minutes)}' ${sign}`
      };
    }

    function toUTCFromLocal(dateStr, timeStr, timezoneId) {
      const [year, month, day] = dateStr.split("-").map(Number);
      const [hour, minute] = timeStr.split(":").map(Number);

      const dt = DateTime.fromObject(
        { year, month, day, hour, minute },
        { zone: timezoneId }
      );

      const utc = dt.toUTC();

      return {
        year: utc.year,
        month: utc.month,
        day: utc.day,
        hour: utc.hour,
        minute: utc.minute,
        second: utc.second
      };
    }

    function julianDate(y, m, d, hourFraction) {
      if (m <= 2) {
        y -= 1;
        m += 12;
      }
      const A = Math.floor(y / 100);
      const B = 2 - A + Math.floor(A / 5);
      return Math.floor(365.25 * (y + 4716))
        + Math.floor(30.6001 * (m + 1))
        + d + B - 1524.5 + hourFraction;
    }

    function calcGMST(jd) {
      const T = (jd - 2451545.0) / 36525.0;
      let GMST = 280.46061837
        + 360.98564736629 * (jd - 2451545.0)
        + 0.000387933 * T * T
        - (T * T * T) / 38710000.0;
      return ((GMST % 360) + 360) % 360;
    }

    function localSiderealTime(jd, lon) {
      let lst = calcGMST(jd) + lon;
      return ((lst % 360) + 360) % 360;
    }

    // POSIÇÕES APROXIMADAS DOS CORPOS
    function approximateLongitude(jd, key) {
      const d = jd - 2451545.0;
      switch (key) {
        case "sun":     return ((280.460 + 0.9856474 * d) % 360 + 360) % 360;
        case "moon":    return ((218.316 + 13.176396 * d) % 360 + 360) % 360;
        case "mercury": return ((60.0   + 4.09233445 * d) % 360 + 360) % 360;
        case "venus":   return ((90.0   + 1.60213034 * d) % 360 + 360) % 360;
        case "mars":    return ((120.0  + 0.52402075 * d) % 360 + 360) % 360;
        case "jupiter": return ((150.0  + 0.08308529 * d) % 360 + 360) % 360;
        case "saturn":  return ((180.0  + 0.03344414 * d) % 360 + 360) % 360;
        case "uranus":  return ((210.0  + 0.01172834 * d) % 360 + 360) % 360;
        case "neptune": return ((240.0  + 0.00598103 * d) % 360 + 360) % 360;
        case "pluto":   return ((270.0  + 0.003964 * d) % 360 + 360) % 360;
        // Quíron (aprox. órbita ~50 anos)
        case "chiron":  return ((200.0  + 0.071429 * d) % 360 + 360) % 360;
        // Lilith (Lua Negra média, aprox.)
        case "lilith":  return ((120.0  + 0.111404 * d) % 360 + 360) % 360;
        // Nodo Norte médio (regressivo)
        case "nnode":   return ((125.0  - 0.05295 * d) % 360 + 360) % 360;
      }
      return 0;
    }

    function calcAscendant(jd, latDeg, lonDeg) {
      const lst = localSiderealTime(jd, lonDeg);
      const eps = 23.4393 * DEG2RAD;
      const lat = latDeg * DEG2RAD;
      const lstRad = lst * DEG2RAD;

      const tanAsc =
        1 / (Math.cos(lstRad) * Math.tan(eps)) -
        Math.tan(lat) * Math.sin(lstRad) / Math.cos(lstRad);

      let asc = Math.atan(tanAsc) * RAD2DEG;

      if (Math.sin(lstRad) > 0) asc += 180;
      asc = ((asc % 360) + 360) % 360;

      return asc;
    }

    function calcMC(jd, lonDeg) {
      const lst = localSiderealTime(jd, lonDeg);
      const eps = 23.4393 * DEG2RAD;
      const lstRad = lst * DEG2RAD;
      let mc = Math.atan(Math.tan(lstRad) / Math.cos(eps)) * RAD2DEG;
      if (mc < 0) mc += 180;
      mc = ((mc % 360) + 360) % 360;
      return mc;
    }

    function calcEqualHouses(asc) {
      const houses = new Array(12).fill(0);
      for (let i = 0; i < 12; i++) {
        houses[i] = ((asc + i * 30) % 360 + 360) % 360;
      }
      return houses;
    }

    function findHouseForDegree(deg, houses) {
      const d = ((deg % 360) + 360) % 360;

      for (let i = 0; i < 12; i++) {
        const cusp = ((houses[i] % 360) + 360) % 360;
        const next = ((houses[(i + 1) % 12] % 360) + 360) % 360;

        if (cusp <= next) {
          if (d >= cusp && d < next) return i + 1;
        } else {
          if (d >= cusp || d < next) return i + 1;
        }
      }
      return 1;
    }

    function isDayChart(sunLon, ascLon) {
      // Aproximação: se Sol está acima do horizonte (entre casas 7 e 12)
      const diff = ((sunLon - ascLon) % 360 + 360) % 360;
      return diff > 180; // bem grosseiro, mas simbólico
    }

    function calcPartOfFortune(sunLon, moonLon, ascLon) {
      const day = isDayChart(sunLon, ascLon);
      let pof;
      if (day) {
        pof = ascLon + moonLon - sunLon;
      } else {
        pof = ascLon - moonLon + sunLon;
      }
      return ((pof % 360) + 360) % 360;
    }

    function calcVertex(jd, latDeg, lonDeg) {
      // Aproximação: Vertex como ponto oposto ao anti-vertex, usando MC e latitude
      const mc = calcMC(jd, lonDeg);
      let vertex = mc + 90;
      return ((vertex % 360) + 360) % 360;
    }

    function generateChartData(formData) {
      const { name, dateStr, timeStr, location } = formData;

      const tzId = location.timezoneId;
      const utc = toUTCFromLocal(dateStr, timeStr, tzId);

      const hourFraction =
        (utc.hour + utc.minute / 60 + utc.second / 3600) / 24;

      const jd = julianDate(
        utc.year, utc.month, utc.day, hourFraction
      );

      const lat = location.lat;
      const lon = location.lon;

      const asc = calcAscendant(jd, lat, lon);
      const mc = calcMC(jd, lon);
      const houses = calcEqualHouses(asc);

      const sunLon = approximateLongitude(jd, "sun");
      const moonLon = approximateLongitude(jd, "moon");
      const nnodeLon = approximateLongitude(jd, "nnode");
      const pofLon = calcPartOfFortune(sunLon, moonLon, asc);
      const vertexLon = calcVertex(jd, lat, lon);

      const pointsData = [];

      POINTS.forEach(p => {
        let lonEcl = 0;
        let house = null;

        if (["sun","moon","mercury","venus","mars","jupiter","saturn","uranus","neptune","pluto","chiron","lilith","nnode"].includes(p.key)) {
          lonEcl = approximateLongitude(jd, p.key);
          house = findHouseForDegree(lonEcl, houses);
        } else if (p.key === "pof") {
          lonEcl = pofLon;
          house = findHouseForDegree(lonEcl, houses);
        } else if (p.key === "vertex") {
          lonEcl = vertexLon;
          house = findHouseForDegree(lonEcl, houses);
        } else if (p.key === "asc") {
          lonEcl = asc;
          house = 1;
        } else if (p.key === "mc") {
          lonEcl = mc;
          house = 10;
        }

        const degInfo = formatDegree(lonEcl);

        pointsData.push({
          key: p.key,
          name: p.name,
          lon: lonEcl,
          sign: degInfo.sign,
          degText: degInfo.text,
          house
        });
      });

      return {
        name,
        dateStr,
        timeStr,
        locationName: location.name,
        tzId,
        jd,
        lat,
        lon,
        asc,
        mc,
        ascInfo: formatDegree(asc),
        mcInfo: formatDegree(mc),
        houses,
        pointsData
      };
    }

    function renderChartSVG(chart) {
      const svg = document.getElementById("chart-svg");
      svg.innerHTML = "";

      const size = 400;
      const cx = size / 2;
      const cy = size / 2;
      const outerR = 180;
      const innerR = 140;

      const circleOuter = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      circleOuter.setAttribute("cx", cx);
      circleOuter.setAttribute("cy", cy);
      circleOuter.setAttribute("r", outerR);
      circleOuter.setAttribute("fill", "none");
      circleOuter.setAttribute("stroke", "rgba(201,168,106,0.6)");
      circleOuter.setAttribute("stroke-width", "3");
      svg.appendChild(circleOuter);

      const circleInner = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      circleInner.setAttribute("cx", cx);
      circleInner.setAttribute("cy", cy);
      circleInner.setAttribute("r", innerR);
      circleInner.setAttribute("fill", "none");
      circleInner.setAttribute("stroke", "rgba(139,105,142,0.5)");
      circleInner.setAttribute("stroke-width", "2");
      svg.appendChild(circleInner);

      for (let i = 0; i < 12; i++) {
        const angle = (i * 30 - 90) * DEG2RAD;
        const x1 = cx + Math.cos(angle) * innerR;
        const y1 = cy + Math.sin(angle) * innerR;
        const x2 = cx + Math.cos(angle) * outerR;
        const y2 = cy + Math.sin(angle) * outerR;

        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", x1);
        line.setAttribute("y1", y1);
        line.setAttribute("x2", x2);
        line.setAttribute("y2", y2);
        line.setAttribute("stroke", "rgba(232,220,194,0.35)");
        line.setAttribute("stroke-width", "1");
        svg.appendChild(line);
      }

      chart.pointsData
        .filter(p => ["Sol","Lua","Mercúrio","Vênus","Marte","Júpiter","Saturno","Urano","Netuno","Plutão"].includes(p.name))
        .forEach(p => {
          const angle = (p.lon - 90) * DEG2RAD;
          const r = (innerR + outerR) / 2;
          const x = cx + Math.cos(angle) * r;
          const y = cy + Math.sin(angle) * r;

          const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          dot.setAttribute("cx", x);
          dot.setAttribute("cy", y);
          dot.setAttribute("r", 6);
          dot.setAttribute("fill", "var(--dourado)");
          dot.setAttribute("stroke", "#000");
          dot.setAttribute("stroke-width", "1.5");
          svg.appendChild(dot);

          const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
          label.setAttribute("x", x + 10);
          label.setAttribute("y", y + 4);
          label.setAttribute("fill", "var(--bege)");
          label.setAttribute("font-size", "11");
          label.textContent = p.name[0];
          svg.appendChild(label);
        });
    }

    function renderTable(chart) {
      const tbody = document.getElementById("table-body");
      tbody.innerHTML = "";

      chart.pointsData.forEach(p => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${p.name}</td>
          <td>${p.sign}</td>
          <td>${p.degText}</td>
          <td>${p.house ? p.house : "-"}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderSummary(chart) {
      const summary = document.getElementById("summary-text");

      summary.innerHTML = `
        <p><strong>Ascendente:</strong> ${chart.ascInfo.text}</p>
        <p><strong>Meio do Céu:</strong> ${chart.mcInfo.text}</p>
        <p><strong>Latitude:</strong> ${chart.lat.toFixed(4)}°</p>
        <p><strong>Longitude:</strong> ${chart.lon.toFixed(4)}°</p>
        <p><strong>Fuso horário (fixo):</strong> ${chart.tzId}</p>
        <p style="font-size: 11px; opacity: 0.7; margin-top: 8px;">
          Observação: cálculos aproximados, fuso fixo em São Paulo. Uso simbólico, não profissional.
        </p>
      `;

      const mono = document.getElementById("mono-block");
      mono.textContent =
        `Mapa Astral de ${chart.name}\n` +
        `Data: ${chart.dateStr}\n` +
        `Hora: ${chart.timeStr}\n` +
        `Local: ${chart.locationName}\n` +
        `Ascendente: ${chart.ascInfo.text}\n` +
        `MC: ${chart.mcInfo.text}\n\n` +
        chart.pointsData
          .map(p => `${p.name}: ${p.degText} (Casa ${p.house || "-"})`)
          .join("\n");
    }

    function showResult() {
      const formView = document.getElementById("view-form");
      const resultView = document.getElementById("view-result");

      formView.classList.remove("view-visible");
      formView.classList.add("view-hidden");

      setTimeout(() => {
        resultView.classList.remove("view-hidden");
        resultView.classList.add("view-visible");
      }, 350);
    }

    function showForm() {
      const formView = document.getElementById("view-form");
      const resultView = document.getElementById("view-result");

      resultView.classList.remove("view-visible");
      resultView.classList.add("view-hidden");

      setTimeout(() => {
        formView.classList.remove("view-hidden");
        formView.classList.add("view-visible");
      }, 350);
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("astroForm").addEventListener("submit", function (e) {
        e.preventDefault();

        const name = document.getElementById("name").value || "Sem nome";
        const dateStr = document.getElementById("birthDate").value;
        const timeStr = document.getElementById("birthTime").value;
        const cityStr = document.getElementById("cidade").value || selectedLocation.name;

        if (!dateStr || !timeStr) {
          alert("Preencha data e hora de nascimento.");
          return;
        }

        const chart = generateChartData({
          name,
          dateStr,
          timeStr,
          location: selectedLocation
        });

        document.getElementById("result-title").textContent = `Mapa Astral de ${name}`;
        document.getElementById("result-meta").textContent =
          `${dateStr} • ${timeStr} • ${cityStr} (fuso: São Paulo)`;

        renderChartSVG(chart);
        renderTable(chart);
        renderSummary(chart);

        showResult();
      });

      document.getElementById("btn-back").addEventListener("click", showForm);

      document.getElementById("btn-copy").addEventListener("click", () => {
        const text = document.getElementById("mono-block").textContent;
        navigator.clipboard.writeText(text);
        alert("Texto copiado!");
      });

      document.getElementById("btn-pdf").addEventListener("click", () => {
        window.print();
      });
    });
  </script>
</body>
</html>
