<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Mapa Astral ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #8b698e;
            --secondary: #6c724d;
            --accent: #c9a86a;
            --light: #e8dcc2;
            --bege: #d9d9d9;
            --dark: #403c39;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--bege);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ESTRELAS E CONSTELAÇÕES */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInUp 1s ease;
        }

        .header h1 {
            font-family: 'Pirata One', cursive;
            font-size: clamp(3rem, 6vw, 5rem);
            background: linear-gradient(135deg, var(--accent), var(--light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            font-weight: 400;
        }

        .subtitle {
            font-size: 1.3rem;
            color: var(--bege);
            opacity: 0.9;
            font-weight: 300;
        }

        .form-section {
            background: rgba(64, 60, 57, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(201, 166, 106, 0.3);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            animation: fadeInUp 1s ease 0.2s both;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .input-group label {
            display: block;
            margin-bottom: 12px;
            font-weight: 500;
            color: var(--light);
            font-size: 1rem;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 18px 20px;
            background: rgba(232, 220, 194, 0.1);
            border: 2px solid rgba(139, 105, 142, 0.4);
            border-radius: 20px;
            font-size: 16px;
            color: var(--bege);
            transition: all 0.3s ease;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(201, 166, 106, 0.4);
        }

        .calculate-btn {
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--light);
            border: none;
            border-radius: 25px;
            font-size: 1.4rem;
            font-family: 'Pirata One', cursive;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .calculate-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 25px 50px rgba(139, 105, 142, 0.5);
        }

        /* RESULTADOS */
        .resultados {
            margin-top: 60px;
            animation: fadeInUp 1s ease 0.5s both;
        }

        .chart-container {
            background: rgba(64, 60, 57, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid rgba(201, 166, 106, 0.3);
            text-align: center;
        }

        .wheel {
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
            border: 8px solid var(--accent);
            border-radius: 50%;
            position: relative;
            background: radial-gradient(circle, rgba(139, 105, 142, 0.2), transparent);
            box-shadow: 0 0 50px rgba(201, 166, 106, 0.5);
            animation: rotateWheel 20s linear infinite;
        }

        @keyframes rotateWheel {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .wheel::before {
            content: 'RODA ASTRAL';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Pirata One', cursive;
            font-size: 1.2rem;
            color: var(--accent);
            z-index: 2;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .card {
            background: linear-gradient(135deg, rgba(139, 105, 142, 0.2), rgba(108, 114, 77, 0.2));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(201, 166, 106, 0.4);
            border-radius: 25px;
            padding: 30px;
            transition: all 0.4s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            border-color: var(--accent);
        }

        .card h3 {
            font-family: 'Pirata One', cursive;
            font-size: 1.6rem;
            margin-bottom: 15px;
            color: var(--accent);
        }

        .planet-symbol {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .pdf-btn {
            flex: 1;
            min-width: 200px;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent), #d9d9d9);
            color: var(--dark);
            border: none;
            border-radius: 25px;
            font-family: 'Pirata One', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pdf-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(201, 166, 106, 0.5);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 60px 40px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(201, 166, 106, 0.3);
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .form-grid, .result-grid {
                grid-template-columns: 1fr;
            }
            .wheel {
                width: 250px;
                height: 250px;
            }
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="header">

        </div>

        <div class="form-section">

                </div>

                        <option value="Maceió-AL">Maceió - AL</option>
                        <option value="São Gonçalo-RJ">São Gonçalo - RJ</option>
                        <option value="Duque de Caxias-RJ">Duque de Caxias - RJ</option>
                        <option value="Natal-RN">Natal - RN</option>
                        <option value="Teresina-PI">Teresina - PI</option>
                        <option value="Campo Grande-MS">Campo Grande - MS</option>
                        <option value="Santo André-SP">Santo André - SP</option>
                        <option value="Osasco-SP">Osasco - SP</option>
                        <option value="São Bernardo do Campo-SP">São Bernardo do Campo - SP</option>
                        <option value="Nova Iguaçu-RJ">Nova Iguaçu - RJ</option>
                        <option value="João Pessoa-PB">João Pessoa - PB</option>
                        <option value="Jaboatão dos Guararapes-PE">Jaboatão dos Guararapes - PE</option>
                        <option value="Uberlândia-MG">Uberlândia - MG</option>

                        <option value="Ribeirão Preto-SP">Ribeirão Preto - SP</option>
                        <option value="Joinville-SC">Joinville - SC</option>
                        <option value="Florianópolis-SC">Florianópolis - SC</option>
                    </select>
                </div>
            </div>
            <button class="calculate-btn" onclick="calcularMapa()">
                ✨ Calcular Mapa Astral
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Calculando posições planetárias...</p>
        </div>

        <div id="resultados" class="resultados" style="display: none;">
            <div class="chart-container">
                <h2 style="font-family: 'Pirata One', cursive; color: var(--accent); margin-bottom: 30px;">
                    Roda Astral do Nascimento
                </h2>
                <div class="wheel" id="roda"></div>
                <p style="opacity: 0.8;">Representação do céu no momento exato do seu nascimento</p>
            </div>

            <div class="result-grid" id="planetas-grid">
                <!-- PLANETAS SERÃO INSERIDOS AQUI -->
            </div>

            <div class="action-buttons">
                <button class="pdf-btn" onclick="gerarPDF()">
                    📄 Gerar PDF do Mapa
                </button>
                <button class="calculate-btn" onclick="calcularMapa()" style="background: linear-gradient(135deg, var(--secondary), var(--primary));">
                    🔮 Novo Cálculo
                </button>
            </div>
        </div>
    </div>

    <script>
        // CRIAR ESTRELAS
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = (Math.random() * 4 + 1) + 'px';
                star.style.animationDelay = Math.random() * 4 + 's';
                starsContainer.appendChild(star);
            }
        }

        function calcularMapa() {
            const nome = document.getElementById('nome').
