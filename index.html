<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Mapa Astral ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* [MESMO CSS ANTERIOR - FUNCIONAL 100%] */
        :root {
            --primary: #8b698e;
            --secondary: #6c724d;
            --accent: #c9a86a;
            --light: #e8dcc2;
            --bege: #d9d9d9;
            --dark: #403c39;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--bege);
            min-height: 100vh;
        }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .container {
            max-width: 1200px; margin: 0 auto; padding: 20px;
            position: relative; z-index: 10;
        }

        .header h1 {
            font-family: 'Pirata One', cursive;
            font-size: clamp(3rem, 6vw, 5rem);
            background: linear-gradient(135deg, var(--accent), var(--light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-align: center; margin-bottom: 15px;
        }

        .subtitle {
            font-size: 1.3rem; text-align: center; opacity: 0.9;
        }

        .form-section {
            background: rgba(64, 60, 57, 0.95);
            backdrop-filter: blur(20px); border-radius: 30px;
            padding: 40px; border: 1px solid rgba(201, 166, 106, 0.3);
            margin-bottom: 40px;
        }

        .form-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; margin-bottom: 40px;
        }

        .input-group input, .input-group select {
            width: 100%; padding: 18px 20px;
            background: rgba(232, 220, 194, 0.1);
            border: 2px solid rgba(139, 105, 142, 0.4);
            border-radius: 20px; font-size: 16px;
            color: var(--bege); transition: all 0.3s ease;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(201, 166, 106, 0.4);
        }

        .calculate-btn {
            width: 100%; padding: 22px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--light); border: none; border-radius: 25px;
            font-family: 'Pirata One', cursive; font-size: 1.4rem;
            cursor: pointer; transition: all 0.3s ease;
        }

        .calculate-btn:hover { transform: translateY(-4px); }

        .resultados { display: none; margin-top: 40px; }
