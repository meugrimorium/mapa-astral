<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meu Mapa Astral</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonte -->
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

<!-- NOVO Google Maps JS + Web Components -->
<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCMHiMnYO6pjaQXzzwOq7wfCuY_uPH6aC8&libraries=maps,places">
</script>
<script type="module"
  src="https://unpkg.com/@googlemaps/extended-component-library@0.6">
</script>

<style>
:root {
  --roxo: #8b698e;
  --verde: #6c724d;
  --dourado: #c9a86a;
  --bege: #e8dcc2;
  --cinza: #d9d9d9;
  --grafite: #403c39;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Segoe UI", sans-serif;
  background: transparent;
  color: var(--bege);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.widget {
  width: 380px;
  background: var(--grafite);
  border-radius: 22px;
  padding: 24px;
  border: 1px solid rgba(232,220,194,0.25);
  box-shadow: 0 12px 28px rgba(0,0,0,0.4);
  position: relative;
  overflow: hidden;
  text-align: center;
}

.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: var(--dourado);
  border-radius: 50%;
  opacity: 0.8;
  animation: twinkle 3s infinite ease-in-out alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; transform: scale(0.8); }
  to   { opacity: 1;   transform: scale(1.3); }
}

.hand { font-family: 'Pirata One', cursive; }

.title {
  font-size: 28px;
  margin-bottom: 16px;
}

.form-group {
  margin-bottom: 12px;
  text-align: left;
  color: var(--bege);
  font-size: 13px;
}

.form-group label { display: block; margin-bottom: 4px; }

.form-group input, gmpx-place-autocomplete {
  width: 100%;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid rgba(232,220,194,0.4);
  background: #2b2624;
  color: var(--bege);
  font-size: 13px;
}

.btn {
  margin-top: 16px;
  display: inline-block;
  padding: 10px 18px;
  background: var(--roxo);
  color: white;
  border-radius: 10px;
  font-family: 'Pirata One', cursive;
  cursor: pointer;
  font-size: 16px;
  border: none;
}

.btn:hover { background: #7a5c7d; }
</style>
</head>

<body>

<div class="widget">
  <div class="star" style="top:10px; left:30px;"></div>
  <div class="star" style="top:40px; right:40px;"></div>
  <div class="star" style="bottom:30px; left:60px;"></div>
  <div class="star" style="bottom:50px; right:80px;"></div>

  <div class="title hand">Meu Mapa Astral</div>

  <form id="astroForm">
    <div class="form-group">
      <label for="name">Nome</label>
      <input id="name" name="name" type="text" placeholder="Seu nome">
    </div>

    <div class="form-group">
      <label for="birthDate">Data de nascimento</label>
      <input id="birthDate" name="birthDate" type="date">
    </div>

    <div class="form-group">
      <label for="birthTime">Hora de nascimento</label>
      <input id="birthTime" name="birthTime" type="time">
    </div>

    <div class="form-group">
      <label for="birthPlace">Local de nascimento</label>

      <!-- ⭐ NOVO AUTOCOMPLETE OFICIAL -->
      <gmpx-place-autocomplete
        id="autocomplete"
        placeholder="Digite a cidade..."
        country="br"
        types="locality"
      ></gmpx-place-autocomplete>

    </div>

    <button type="submit" class="btn hand">Gerar mapa astral</button>
  </form>
</div>

<script>
let selectedLocation = null;

/* ⭐ NOVO EVENTO DO NOVO AUTOCOMPLETE */
document.addEventListener("DOMContentLoaded", () => {
  const ac = document.getElementById("autocomplete");

  ac.addEventListener("gmpx-placechange", () => {
    const place = ac.getPlace();

    if (!place || !place.location) {
      alert("Selecione uma cidade válida.");
      return;
    }

    selectedLocation = {
      name: ac.value,
      lat: place.location.lat(),
      lon: place.location.lng()
    };
  });
});

function escapeHTML(str) {
  return str
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/`/g, "&#96;")
    .replace(/\$/g, "&#36;");
}

document.getElementById('astroForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const name = document.getElementById('name').value || 'Sem nome';
  const birthDate = document.getElementById('birthDate').value;
  const birthTime = document.getElementById('birthTime').value;
  const birthPlace = selectedLocation ? selectedLocation.name : document.getElementById('autocomplete').value;

  const textBlock = escapeHTML(
    [
      `Mapa Astral de ${name}`,
      `Data: ${birthDate || '—'}`,
      `Hora: ${birthTime || '—'}`,
      `Local: ${birthPlace}`,
    ].join("\n")
  );

  const win = window.open('', '_blank');

  const html =
    "<!DOCTYPE html>" +
    "<html><head><meta charset='UTF-8'>" +
    `<title>Mapa Astral de ${name}</title>` +
    "<style>body{font-family:Segoe UI;background:#403c39;color:#e8dcc2;padding:24px;}textarea{width:100%;height:200px;background:#2b2624;color:#e8dcc2;border:1px solid #c9a86a;border-radius:10px;padding:10px;}</style>" +
    "</head><body>" +
    `<h1 style='font-family:Pirata One;'>Mapa Astral de ${name}</h1>` +
    `<p>Data: ${birthDate || '—'} • Hora: ${birthTime || '—'} • Local: ${birthPlace}</p>` +
    "<textarea>" + textBlock + "</textarea>" +
    "</body></html>";

  win.document.open();
  win.document.write(html);
  win.document.close();
});
</script>

</body>
</html>
