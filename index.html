<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Mapa Astral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Segoe+UI:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .title-font { font-family: 'Pirata One', cursive; }
        .gradient-bg {
            background: linear-gradient(135deg, #403c39 0%, #8b698e 30%, #6c724d 70%, #403c39 100%);
        }
        .glass { 
            backdrop-filter: blur(20px);
            background: rgba(232, 220, 194, 0.1);
            border: 1px solid rgba(217, 217, 217, 0.3);
        }
        .text-bege { color: #e8dcc2; }
        .text-bege-light { color: #d9d9d9; }
        .accent-gold { color: #c9a86a; }
    </style>
</head>
<body class="min-h-screen gradient-bg text-bege p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="title-font text-5xl md:text-7xl font-bold mb-4 bg-gradient-to-r from-[#c9a86a] via-[#e8dcc2] to-[#d9d9d9] bg-clip-text text-transparent drop-shadow-2xl">
                Meu Mapa Astral
            </h1>
            <p class="text-xl text-bege-light max-w-2xl mx-auto leading-relaxed opacity-90 font-medium">Mapa natal completo • 10 planetas • Ascendente • Fuso automático</p>
        </div>

        <div class="glass rounded-3xl p-8 md:p-12 mb-12 shadow-2xl border-[#d9d9d9]/30">
            <form id="natalForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="name" placeholder="Nome completo" class="w-full p-5 bg-[#403c39]/50 rounded-2xl border border-[#8b698e]/50 focus:outline-none focus:border-[#c9a86a] focus:ring-2 focus:ring-[#c9a86a]/30 text-lg placeholder-[#d9d9d9]/70 text-bege-light font-medium" required>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="birthDate" max="" class="p-5 bg-[#403c39]/50 rounded-2xl border border-[#8b698e]/50 focus:outline-none focus:border-[#c9a86a] focus:ring-2 focus:ring-[#c9a86a]/30 text-bege-light" required>
                        <input type="time" id="birthTime" value="12:00" class="p-5 bg-[#403c39]/50 rounded-2xl border border-[#8b698e]/50 focus:outline-none focus:border-[#c9a86a] focus:ring-2 focus:ring-[#c9a86a]/30 text-bege-light" required>
                    </div>

                    <input type="text" id="birthCity" placeholder="São Paulo" class="w-full p-5 bg-[#403c39]/50 rounded-2xl border border-[#8b698e]/50 focus:outline-none focus:border-[#c9a86a] focus:ring-2 focus:ring-[#c9a86a]/30 text-lg placeholder-[#d9d9d9]/70 text-bege-light font-medium" required>
                    <input type="text" id="birthState" placeholder="SP" class="w-full p-5 bg-[#403c39]/50 rounded-2xl border border-[#8b698e]/50 focus:outline-none focus:border-[#c9a86a] focus:ring-2 focus:ring-[#c9a86a]/30 text-lg placeholder-[#d9d9d9]/70 text-bege-light font-medium">
                    <input type="text" id="birthCountry" value="Brasil" class="w-full p-5 bg-[#403c39]/50 rounded-2xl border border-[#8b698e]/50 focus:outline-none focus:border-[#c9a86a] focus:ring-2 focus:ring-[#c9a86a]/30 text-lg text-bege-light font-medium">
                </div>

                <button type="submit" id="calculateBtn" class="w-full title-font bg-gradient-to-r from-[#c9a86a] via-[#e8dcc2] to-[#d9d9d9] text-[#403c39] font-bold py-6 px-8 rounded-2xl text-xl hover:from-[#8b698e] hover:via-[#c9a86a] hover:to-[#e8dcc2] transform hover:scale-105 transition-all duration-300 shadow-2xl hover:shadow-[#c9a86a]/50">
                    ✨ Calcular Meu Mapa Astral
                </button>
            </form>
        </div>

        <div id="loading" class="hidden text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-[#c9a86a] mx-auto"></div>
            <p class="mt-4 text-xl text-bege-light font-medium">🔮 Calculando posições celestiais...</p>
        </div>

        <div id="error" class="hidden bg-[#6c724d]/20 border border-[#8b698e]/50 text-bege p-8 rounded-2xl mb-8 text-center shadow-xl font-medium"></div>

        <div id="result" class="hidden">
            <div class="glass rounded-3xl p-8 mb-8 shadow-2xl border-[#d9d9d9]/30">
                <h2 class="title-font text-4xl font-bold mb-8 text-center bg-gradient-to-r from-[#c9a86a] via-[#e8dcc2] to-[#d9d9d9] bg-clip-text text-transparent drop-shadow-xl">
                    📊 Meu Mapa Astral Completo
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                    <div class="text-center p-6 bg-gradient-to-br from-[#c9a86a]/20 to-[#e8dcc2]/10 rounded-2xl border border-[#c9a86a]/40 shadow-lg hover:shadow-[#c9a86a]/30 transition-all">
                        <div class="text-4xl font-bold accent-gold mb-3">☉</div>
                        <div class="text-2xl font-bold text-bege mb-1" id="sunSign">-</div>
                        <div class="text-bege-light font-medium text-sm opacity-90" id="sunDetails">-</div>
                    </div>
                    <div class="text-center p-6 bg-gradient-to-br from-[#8b698e]/20 to-[#6c724d]/20 rounded-2xl border border-[#8b698e]/40 shadow-lg hover:shadow-[#8b698e]/30 transition-all">
                        <div class="text-4xl font-bold text-[#e8dcc2] mb-3">🌙</div>
                        <div class="text-2xl font-bold text-bege mb-1" id="moonSign">-</div>
                        <div class="text-bege-light font-medium text-sm opacity-90" id="moonDetails">-</div>
                    </div>
                    <div class="text-center p-6 bg-gradient-to-br from-[#6c724d]/20 to-[#403c39]/20 rounded-2xl border border-[#6c724d]/40 shadow-lg hover:shadow-[#6c724d]/30 transition-all">
                        <div class="text-4xl font-bold text-[#c9a86a] mb-3">⬆️</div>
                        <div class="text-2xl font-bold text-bege mb-1" id="ascendant">-</div>
                        <div class="text-bege-light font-medium text-sm opacity-90" id="ascDetails">-</div>
                    </div>
                </div>
                
                <div class="grid md:grid-cols-2 gap-6 text-sm">
                    <div id="locationInfo" class="p-6 bg-[#403c39]/30 rounded-2xl backdrop-blur-sm border border-[#8b698e]/30 font-medium"></div>
                    <div id="timezoneInfo" class="p-6 bg-[#403c39]/30 rounded-2xl backdrop-blur-sm border border-[#8b698e]/30 font-medium"></div>
                </div>
            </div>

            <div class="glass rounded-3xl p-8 shadow-2xl border-[#d9d9d9]/30">
                <h3 class="title-font text-3xl font-bold mb-8 text-center bg-gradient-to-r from-[#8b698e] via-[#c9a86a] to-[#6c724d] bg-clip-text text-transparent drop-shadow-lg">
                    🪐 Posições Completas dos Planetas
                </h3>
                <div id="planetsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                    <!-- Planetas inseridos via JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // ✅ CÓDIGO CORRIGIDO - SEM DEPENDÊNCIAS EXTERNAS
        const SIGNS = ["Áries","Touro","Gêmeos","Câncer","Leão","Virgem","Libra","Escorpião","Sagitário","Capricórnio","Aquário","Peixes"];
        const PLANETS = ["☉ Sol","🌙 Lua","☿ Mercúrio","♀ Vênus","♂ Marte","♃ Júpiter","♄ Saturno","⛢ Urano","♆ Netuno","♇ Plutão"];
        const CITY_COORDS = {
            "são paulo": [-23.5505, -46.6333], "sp": [-23.5505, -46.6333],
            "rio de janeiro": [-22.9068, -43.1729], "rj": [-22.9068, -43.1729],
            "brasília": [-15.8267, -47.9218], "df": [-15.8267, -47.9218],
            "salvador": [-12.9716, -38.5108], "ba": [-12.9716, -38.5108],
            "fortaleza": [-3.7172, -38.5430], "ce": [-3.7172, -38.5430],
            "belo horizonte": [-19.9167, -43.9345], "mg": [-19.9167, -43.9345],
            "manaus": [-3.1190, -60.0217], "am": [-3.1190, -60.0217],
            "curitiba": [-25.4288, -49.2731], "pr": [-25.4288, -49.2731],
            "recife": [-8.0476, -34.8769], "pe": [-8.0476, -34.8769],
            "porto alegre": [-30.0331, -51.2300], "rs": [-30.0331, -51.2300]
        };

        async function calculateNatalChart(data) {
            try {
                // ✅ Data válida
                const birthDate = new Date(`${data.date}T${data.time}:00`);
                if (isNaN(birthDate.getTime())) throw new Error("Data inválida");

                // ✅ Coordenadas locais (sem API externa)
                const cityLower = data.city.toLowerCase().replace(/[\sáàãâä]/g,'');
                const coords = CITY_COORDS[cityLower] || CITY_COORDS[data.birthState?.toLowerCase()] || [-23.5505, -46.6333];
                
                // ✅ Fuso horário Brasil
                const year = birthDate.getFullYear();
                const dstStart = new Date(year, 9, 15); // 3ª domingo outubro
                const dstEnd = new Date(year, 1, 15);   // 3ª domingo fevereiro
                const offset = (birthDate >= dstStart || birthDate < dstEnd) ? -2 : -3;

                // ✅ UTC
                const utcDate = new Date(birthDate.getTime() - (offset * 3600000));
                const jd = toJulianDate(utcDate);
                
                // ✅ Planetas
                const positions = calculateAllPlanets(jd);
                const ascendant = calculateAscendant(jd, coords[0]);
                
                return {
                    planets: positions,
                    ascendant: formatPosition(ascendant),
                    sun: positions[0], moon: positions[1],
                    timezone: `UTC${offset}`,
                    location: `${data.city}, ${data.state || ''}`,
                    coords: `${coords[0].toFixed(4)}° ${coords[1].toFixed(4)}°`,
                    jd: jd.toFixed(6)
                };
            } catch (error) {
                throw new Error(`Erro no cálculo: ${error.message}`);
            }
        }

        function toJulianDate(date) {
            let year = date.getUTCFullYear(), month = date.getUTCMonth() + 1;
            const day = date.getUTCDate() + (date.getUTCHours() + date.getUTCMinutes()/60 + date.getUTCSeconds()/3600)/24;
            
            if (month <= 2) { year--; month += 12; }
            const a = Math.floor(year / 100), b = 2 - a + Math.floor(a / 4);
            
            return Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day + b - 1524.5;
        }

        function calculateAllPlanets(jd) {
            const t = (jd - 2451545.0) / 36525;
            const positions = [];
            const rates = [0, 481267.883, 149472.674, 58517.815, 31932.588, 3034.906, 1222.493, 428.482, 218.459, 145.207];
            const offsets = [280.466, 218.32, 252.251, 181.979, 355.433, 34.404, 49.944, 313.238, 304.883, 238.929];
            
            PLANETS.forEach((name, i) => {
                let longitude = i === 0 ? (offsets[0] + 36000.76983 * t) % 360 : (offsets[i] + rates[i] * t) % 360;
                const signIdx = Math.floor(longitude / 30);
                const deg = longitude % 30;
                positions.push({
                    name, longitude: longitude.toFixed(2),
                    sign: SIGNS[signIdx], degree: deg.toFixed(1) + "°",
                    house: `Casa ${Math.floor(longitude / 30) + 1}`
                });
            });
            return positions;
        }

        function calculateAscendant(jd, lat) {
            const gst = (280.46061837 + 360.98564736629 * (jd - 2451545)) % 360;
            const eps = 23.4393, latRad = lat * Math.PI / 180;
            const x = Math.cos(gst * Math.PI/180);
            const y = Math.sin(gst * Math.PI/180) * Math.cos(eps * Math.PI/180) + Math.tan(latRad) * Math.sin(eps * Math.PI/180);
            return (Math.atan2(y, x) * 180/Math.PI + 90) % 360;
        }

        function formatPosition(long) {
            const signIdx = Math.floor(long / 30);
            return `${SIGNS[signIdx]} ${ (long % 30).toFixed(1) }°`;
        }

        // ✅ Event Listeners
        document.getElementById('birthDate').addEventListener('change', function() {
            const today = new Date(); today.setHours(0,0,0,0);
            const maxDate = new Date(today); maxDate.setFullYear(today.getFullYear() - 1);
            this.max = maxDate.toISOString().split('T')[0];
        });

        document.getElementById('natalForm').addEventListener('submit', async e => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                date: document.getElementById('birthDate').value,
                time: document.getElementById('birthTime').value,
                city: document.getElementById('birthCity').value,
                state: document.getElementById('birthState').value
            };

            const loadingEl = document.getElementById('loading');
            const resultEl = document.getElementById('result');
            const errorEl = document.getElementById('error');
            const btn = document.getElementById('calculateBtn');

            loadingEl.classList.remove('hidden');
            resultEl.classList.add('hidden');
            errorEl.classList.add('hidden');
            btn.disabled = true; btn.innerHTML = '⏳ Calculando...';

            try {
                const chart = await calculateNatalChart(data);
                displayChart(chart);
                resultEl.classList.remove('hidden');
            } catch (err) {
                errorEl.innerHTML = `❌ ${err.message}`;
                errorEl.classList.remove('hidden');
                console.error
